name: 📊 Auto-Update FII & DII Data

on:
  schedule:
    - cron: '15 10 * * 1-5'   # 3:45 PM IST (Right after market close)
    - cron: '30 12 * * 1-5'   # 6:00 PM IST (Primary publish window)
    - cron: '00 13 * * 1-5'   # 6:30 PM IST (Secondary publish window fallback)
  workflow_dispatch:            # Allow manual trigger from GitHub Actions tab

jobs:
  update-fii-dii-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm install

      - name: 📡 Fetch FII & DII Data
        id: fetch
        run: npm run fetch

      - name: 📊 Fetch NSE Market Statistics
        id: fetchstats
        run: node -e "require('./scripts/fetch_data').fetchMarketStats()"
        continue-on-error: true

      - name: 🔄 Fetch Sector Returns
        id: fetchsectors
        run: node scripts/fetch_sectors.js
        continue-on-error: true

      - name: 💾 Commit updated data
        if: steps.fetch.outcome == 'success'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --staged --quiet || git commit -m "📊 Auto-update: $(date +'%d-%b-%Y %H:%M IST')"
          git push
